server:
  listen_address: "0.0.0.0:9200"
  refresh_interval: 5s
  discovery_interval: 60s

identity:
  host: "localhost"   # overridden at runtime by HWEXP_HOST environment variable
  platform: "linux"

adapters:
  linux_hwmon:
    enabled: true
  linux_gpu_vendor:
    enabled: true

mapping:
  rules_file: "/etc/hwexp/mappings.yaml"
  strict_mode: false
  auto_map:
    enabled: true
    generated_file: "/var/lib/hwexp/mappings.auto.yaml"
