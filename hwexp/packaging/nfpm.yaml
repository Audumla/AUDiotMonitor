name: "hwexp"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "default"
priority: "extra"
maintainer: "AUDiot Project <maintainer@audiot.local>"
description: "AUDiot Hardware Telemetry Exporter"
vendor: "AUDiot"
homepage: "https://github.com/your-org/audiot"
license: "MIT"

contents:
  - src: "hwexp"
    dst: "/usr/bin/hwexp"
    file_info:
      mode: 0755
  - src: "packaging/hwexp.yaml"
    dst: "/etc/hwexp/hwexp.yaml"
    type: "config"
  - src: "configs/mappings.yaml"
    dst: "/etc/hwexp/mappings.yaml"
    type: "config"
  - src: "tests/fixtures/sample_hwmon.json"
    dst: "/etc/hwexp/sample_hwmon.json"
    type: "config"
  - src: "packaging/hwexp.service"
    dst: "/usr/lib/systemd/system/hwexp.service"

scripts:
  postinstall: "packaging/scripts/postinstall.sh"
  preremove: "packaging/scripts/preremove.sh"

overrides:
  deb:
    depends:
      - libc6
  rpm:
    depends:
      - glibc
