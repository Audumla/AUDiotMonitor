global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: netdata
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:19999']
    metrics_path: /api/v1/allmetrics
    params:
      format: ['prometheus']

  - job_name: llamaswap
    static_configs:
      - targets: ['host.docker.internal:9300']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
