# AUDiot Monitor — Dashboard Stack
#
# Intended layout:
#   ./config/grafana/...     -> Grafana provisioning and grafana.ini
#   ./config/kiosk.env       -> Kiosk selection config
#   ./dashboards/profiles/   -> Default profiles
#   ./dashboards/custom/     -> Your own dashboards for this host
#
# Install the layout into /opt/docker/dashboard with:
#   ./install-layout.sh
#
# Then start Grafana with:
#   cd /opt/docker/dashboard
#   docker compose up -d

services:

  grafana:
    image: grafana/grafana:latest   # multi-arch manifest: arm64, arm/v7, amd64
    container_name: audiot-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://localhost:9090}
      - HWEXP_URL=${HWEXP_URL:-http://localhost:9200}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_DATABASE_WAL=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    restart: unless-stopped

volumes:
  grafana-data:
