# AUDiot Monitor — Dashboard Stack (Standalone Pre-built Image)
#
# Uses the pre-built audumla/audiot-dashboard image published on Docker Hub.
# All Grafana UI patches (kiosk CSS/JS, branding removal) are baked into the
# image — no repo clone, no runtime patching required.
#
# Quickstart:
#   PROMETHEUS_URL=http://<collector-ip>:9090 docker compose -f docker-compose.image.yml up -d

services:

  grafana:
    image: audumla/audiot-dashboard:latest
    container_name: audiot-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://localhost:9090}
      - HWEXP_URL=${HWEXP_URL:-http://localhost:9200}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    restart: unless-stopped

volumes:
  grafana-dashboards:
  grafana-data:
