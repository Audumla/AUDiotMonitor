# AUDiot Monitor — Dashboard Stack (Standalone Image)
#
# Runs the official pre-baked AUDiot Grafana image.
# No config files or repo clone needed — just run:
#
#   PROMETHEUS_URL=http://<collector-ip>:9090 docker compose up -d

services:

  grafana:
    image: audumla/audiot-dashboard:latest
    container_name: audiot-grafana
    ports:
      - "3000:3000"
    volumes:
      # Persistent storage for dashboards and Grafana database
      - grafana-dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
      - ./config/grafana/custom-grafana.css:/opt/grafana-patch/custom-grafana.css:ro
      - ./config/grafana/post-start-patch.sh:/opt/grafana-patch/post-start-patch.sh:ro
    post_start:
      - command: /bin/sh /opt/grafana-patch/post-start-patch.sh
        user: root
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://localhost:9090}
      - HWEXP_URL=${HWEXP_URL:-http://localhost:9200}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    restart: unless-stopped

volumes:
  grafana-dashboards:
  grafana-data:
