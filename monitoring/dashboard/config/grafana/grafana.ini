[auth.anonymous]
enabled = true
org_role = Viewer

[dashboards]
# Default home shown when a user opens Grafana without the kiosk launcher.
# The kiosk.sh script overrides this at launch by opening the resolution-matched
# dashboard directly in Chromium — this path is only used by the Grafana UI.
default_home_dashboard_path = /var/lib/grafana/dashboards/profiles/standard/system-overview.json
