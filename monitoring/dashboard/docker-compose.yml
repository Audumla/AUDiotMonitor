# AUDiot Monitor — Dashboard Stack
#
# Runs Grafana with pre-loaded AUDiot dashboards.
# No config files or repo clone needed — just run:
#
#   PROMETHEUS_URL=http://<collector-ip>:9090 docker compose up -d
#
# If collector is on the same machine, the default (http://localhost:9090) works:
#
#   docker compose up -d

services:

  # ── Init: download dashboards and write Grafana provisioning ──────────────
  grafana-init:
    image: busybox
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://localhost:9090}
    command:
      - sh
      - -c
      - |
        set -e
        BASE="https://raw.githubusercontent.com/Audumla/AUDiotMonitor/main"

        mkdir -p /provisioning/datasources /provisioning/dashboards /dashboards

        # Datasource — points at Prometheus
        cat > /provisioning/datasources/prometheus.yaml << EOF
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: ${PROMETHEUS_URL:-http://localhost:9090}
            isDefault: true
            editable: false
        EOF

        # Dashboard provider — tells Grafana where to find the JSON files
        cat > /provisioning/dashboards/dashboards.yaml << 'EOF'
        apiVersion: 1
        providers:
          - name: AUDiot Dashboards
            orgId: 1
            folder: AUDiot
            type: file
            disableDeletion: false
            editable: true
            allowUiUpdates: true
            options:
              path: /var/lib/grafana/dashboards
        EOF

        # Download dashboard JSON files from GitHub
        wget -q -O /dashboards/system-overview.json      "$BASE/monitoring/dashboard/dashboards/system-overview.json"
        wget -q -O /dashboards/panel-dashboard.json      "$BASE/monitoring/dashboard/dashboards/panel-dashboard.json"
        wget -q -O /dashboards/discovery-dashboard.json  "$BASE/monitoring/dashboard/dashboards/discovery-dashboard.json"
        wget -q -O /dashboards/operations-dashboard.json "$BASE/monitoring/dashboard/dashboards/operations-dashboard.json"

        echo "Grafana init complete"
    volumes:
      - grafana-provisioning:/provisioning
      - grafana-dashboards:/dashboards

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: audiot-grafana
    depends_on:
      grafana-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana-dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    restart: unless-stopped

volumes:
  grafana-provisioning:
  grafana-dashboards:
  grafana-data:
