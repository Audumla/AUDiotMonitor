# AUDiot Monitor — Dashboard Stack (Display Node)
#
# Grafana-only stack for a kiosk display node pointing at an external
# Prometheus/hwexp collector.  Uses the pre-built Docker Hub image —
# no git clone or local build required.
#
# Prerequisites:
#   - Docker installed
#   - .env file with PROMETHEUS_URL and HWEXP_URL set (see .env.example)
#   - ./dashboards/ directory present (profiles/ + custom/)
#
# Quickstart:
#   cp .env.example .env          # then edit PROMETHEUS_URL / HWEXP_URL
#   docker compose up -d
#
# Local development (build image from source):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#   (create docker-compose.override.yml with `services.grafana.build: .`)

services:

  grafana:
    image: audumla/audiot-dashboard:${DASHBOARD_TAG:-latest}
    container_name: audiot-grafana
    init: true
    entrypoint: /run.sh   # use Grafana's native entrypoint; provisioning is baked into the image
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    volumes:
      - ./dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://host.docker.internal:9090}
      - HWEXP_URL=${HWEXP_URL:-http://host.docker.internal:9200}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_DATABASE_WAL=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "(wget -q -O- http://localhost:3000/api/health 2>/dev/null || curl -sf http://localhost:3000/api/health 2>/dev/null) | grep -q 'database'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped

  kiosk:
    image: audumla/audiot-kiosk:${KIOSK_TAG:-latest}
    container_name: audiot-kiosk
    init: true
    depends_on:
      grafana:
        condition: service_healthy
    user: "${KIOSK_UID:-1000}:${KIOSK_GID:-1000}"
    environment:
      - USER=${KIOSK_USER:-audumla}
      - HOME=/tmp
      - XDG_CONFIG_HOME=/tmp/.config
      - KIOSK_CONFIG_FILE=/dev/null
      - XAUTHORITY=/tmp/.Xauthority
      - DISPLAY=${KIOSK_DISPLAY:-:0}
      - WAYLAND_DISPLAY=${KIOSK_WAYLAND_DISPLAY:-wayland-0}
      - XDG_RUNTIME_DIR=/run/user/${KIOSK_UID:-1000}
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/${KIOSK_UID:-1000}/bus
      - KIOSK_DASHBOARD=${KIOSK_DASHBOARD:-}
      - KIOSK_REFRESH=${KIOSK_REFRESH:-5s}
    volumes:
      - /run/user/${KIOSK_UID:-1000}:/run/user/${KIOSK_UID:-1000}
      - /home/${KIOSK_USER:-audumla}/.Xauthority:/tmp/.Xauthority:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input
    group_add:
      - "${KIOSK_VIDEO_GID:-44}"
      - "${KIOSK_INPUT_GID:-104}"
    devices:
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input
    security_opt:
      - seccomp=unconfined
    shm_size: "256m"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -fa 'chromium|google-chrome' > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    stop_grace_period: 20s
    restart: unless-stopped

volumes:
  grafana-data:
