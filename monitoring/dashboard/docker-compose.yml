# AUDiot Monitor — Dashboard Stack (Display Node)
#
# Grafana-only stack for a kiosk display node pointing at an external
# Prometheus/hwexp collector.  Uses the pre-built Docker Hub image —
# no git clone or local build required.
#
# Prerequisites:
#   - Docker installed
#   - .env file with PROMETHEUS_URL and HWEXP_URL set (see .env.example)
#   - ./dashboards/ directory present (profiles/ + custom/)
#
# Quickstart:
#   cp .env.example .env          # then edit PROMETHEUS_URL / HWEXP_URL
#   docker compose up -d
#
# Local development (build image from source):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#   (create docker-compose.override.yml with `services.grafana.build: .`)

services:

  grafana:
    image: audumla/audiot-dashboard:${AUDIOT_TAG:-latest}
    container_name: audiot-grafana
    entrypoint: /run.sh   # use Grafana's native entrypoint; provisioning is baked into the image
    ports:
      - "3000:3000"
    volumes:
      - ./dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://host.docker.internal:9090}
      - HWEXP_URL=${HWEXP_URL:-http://host.docker.internal:9200}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_DATABASE_WAL=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    restart: unless-stopped

volumes:
  grafana-data:
