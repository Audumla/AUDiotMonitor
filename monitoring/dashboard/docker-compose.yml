# AUDiot Monitor — Dashboard Stack
#
# Runs Grafana with pre-loaded AUDiot dashboards.
# No config files or repo clone needed — just run:
#
#   PROMETHEUS_URL=http://<collector-ip>:9090 docker compose up -d
#
# If collector is on the same machine, the default (http://localhost:9090) works:
#
#   docker compose up -d

services:

  # ── Init: download dashboards and write Grafana provisioning ──────────────
  grafana-init:
    image: busybox
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://localhost:9090}
    command:
      - sh
      - -c
      - |
        set -e
        BASE="https://raw.githubusercontent.com/Audumla/AUDiotMonitor/main"

        mkdir -p /provisioning/datasources /provisioning/dashboards /dashboards

        # Datasource — only write if not already present (preserves manual edits)
        if [ ! -f /provisioning/datasources/prometheus.yaml ]; then
          cat > /provisioning/datasources/prometheus.yaml << EOF
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: ${PROMETHEUS_URL:-http://localhost:9090}
            isDefault: true
            editable: false
        EOF
        fi

        # Dashboard provider — only write if not already present
        if [ ! -f /provisioning/dashboards/dashboards.yaml ]; then
          cat > /provisioning/dashboards/dashboards.yaml << 'EOF'
        apiVersion: 1
        providers:
          - name: AUDiot Dashboards
            orgId: 1
            folder: AUDiot
            type: file
            disableDeletion: false
            editable: true
            allowUiUpdates: true
            options:
              path: /var/lib/grafana/dashboards
        EOF
        fi

        # Download dashboard JSON files from GitHub (skip if already present)
        for dash in system-overview panel-dashboard discovery-dashboard operations-dashboard; do
          if [ ! -f "/dashboards/${dash}.json" ]; then
            echo "Downloading ${dash}.json..."
            wget -q -O "/dashboards/${dash}.json" "$BASE/monitoring/dashboard/dashboards/${dash}.json"
          fi
        done

        echo "Grafana init complete"
    volumes:
      - grafana-provisioning:/provisioning
      - grafana-dashboards:/dashboards

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: audiot-grafana
    depends_on:
      grafana-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana-dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    restart: unless-stopped

volumes:
  grafana-provisioning:
  grafana-dashboards:
  grafana-data:
