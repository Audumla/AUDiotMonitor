# AUDiot Monitor — Dashboard Stack
#
# Runs Grafana with pre-loaded AUDiot dashboards.
# No config files or repo clone needed — just run:
#
#   PROMETHEUS_URL=http://<collector-ip>:9090 docker compose up -d

services:

  # ── Init: scaffold dashboard profiles and write Grafana provisioning ────────
  grafana-init:
    image: busybox
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://localhost:9090}
      - SKIP_DASHBOARD_DOWNLOAD=${SKIP_DASHBOARD_DOWNLOAD:-false}
    command:
      - sh
      - -c
      - |
        set -e
        BASE="https://raw.githubusercontent.com/Audumla/AUDiotMonitor/main"

        mkdir -p /provisioning/datasources /provisioning/dashboards /dashboards/profiles/standard /dashboards/profiles/wide-screens /dashboards/profiles/mobile /dashboards/profiles/debug

        # Datasource — only write if not already present
        if [ ! -f /provisioning/datasources/prometheus.yaml ]; then
          cat > /provisioning/datasources/prometheus.yaml << EOF
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: ${PROMETHEUS_URL:-http://localhost:9090}
            isDefault: true
            editable: false
        EOF
        fi

        # Dashboard provider — recursive structure enabled
        if [ ! -f /provisioning/dashboards/dashboards.yaml ]; then
          cat > /provisioning/dashboards/dashboards.yaml << 'EOF'
        apiVersion: 1
        providers:
          - name: 'AUDiot Profiles'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            allowUiUpdates: true
            options:
              path: /var/lib/grafana/dashboards
              foldersFromFilesStructure: true
        EOF
        fi

        # Download profiles if missing (allows persistence of user edits)
        if [ "$SKIP_DASHBOARD_DOWNLOAD" != "true" ]; then
          echo "Downloading dashboard profiles..."
          # standard
          for d in system-overview panel-1080p; do
            [ ! -f "/dashboards/profiles/standard/$${d}.json" ] && wget -q -O "/dashboards/profiles/standard/$${d}.json" "$${BASE}/monitoring/dashboard/dashboards/profiles/standard/$${d}.json" || true
          done
          # wide-screens
          for d in panel-1920x440; do
            [ ! -f "/dashboards/profiles/wide-screens/$${d}.json" ] && wget -q -O "/dashboards/profiles/wide-screens/$${d}.json" "$${BASE}/monitoring/dashboard/dashboards/profiles/wide-screens/$${d}.json" || true
          done
          # mobile
          for d in panel-portrait; do
            [ ! -f "/dashboards/profiles/mobile/$${d}.json" ] && wget -q -O "/dashboards/profiles/mobile/$${d}.json" "$${BASE}/monitoring/dashboard/dashboards/profiles/mobile/$${d}.json" || true
          done
          # debug
          for d in discovery-dashboard operations-dashboard panel-dashboard; do
            [ ! -f "/dashboards/profiles/debug/$${d}.json" ] && wget -q -O "/dashboards/profiles/debug/$${d}.json" "$${BASE}/monitoring/dashboard/dashboards/profiles/debug/$${d}.json" || true
          done
        else
          echo "Skipping dashboard download as requested"
        fi

        echo "Grafana init complete"
    volumes:
      - grafana-provisioning:/provisioning
      - grafana-dashboards:/dashboards

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: audiot-grafana
    depends_on:
      grafana-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana-dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    restart: unless-stopped

volumes:
  grafana-provisioning:
  grafana-dashboards:
  grafana-data:
