# AUDiot Monitor — Collector Stack
#
# Runs on every machine you want to monitor.
# No config files or repo clone needed — just run:
#
#   docker compose up -d
#
# Optional: set HWEXP_HOST to label metrics with this machine's name.
#   HWEXP_HOST=myserver docker compose up -d

services:

  # ── Hardware sensor exporter ───────────────────────────────────────────────
  hwexp:
    image: audumla/audiot-hwexp:latest
    container_name: hwexp
    privileged: true                  # required for hwmon, dmidecode, /sys writes
    volumes:
      - /sys:/sys:ro
      - /proc:/proc:ro
      - ./hwexp:/var/lib/hwexp        # persists auto-generated mapping rules
    environment:
      HWEXP_HOST: ${HWEXP_HOST:-${HOSTNAME:-localhost}}
    ports:
      - "9200:9200"
    restart: unless-stopped

  # ── OS metrics exporter ───────────────────────────────────────────────────
  # network_mode: host is required for:
  #   - ethtool: ioctl calls must run in the host network namespace
  #   - systemd/logind: dbus socket is on the host filesystem
  # With host networking, node-exporter binds directly to host port 9100
  # (no ports: mapping needed). Prometheus reaches it via host.docker.internal.
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    network_mode: host
    pid: host
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/dbus:/run/dbus:ro         # systemd/logind dbus socket
      - /run/dbus:/var/run/dbus:ro     # same socket at alternate path
      - /run/udev:/run/udev:ro         # udev data for disk model/serial labels
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      # Extra collectors disabled by default
      - --collector.thermal_zone       # thermal zones via sysfs
      - --collector.rapl               # Intel RAPL power domain readings
      - --collector.processes          # process/thread counts from /proc
      - --collector.interrupts         # per-CPU hardware interrupt counts
      - --collector.softirqs           # per-CPU software interrupt counts
      - --collector.tcpstat            # TCP connection state counts
      - --collector.systemd            # systemd unit states (needs dbus)
      - --collector.ethtool            # extended NIC ethtool stats (needs host net)
      - --collector.wifi               # WiFi interface link statistics
      - --collector.buddyinfo          # kernel buddy memory allocator
      - --collector.drbd               # DRBD replication (no-op if absent)
      - --collector.mdadm              # Linux software RAID arrays
      - --collector.xfs                # XFS filesystem statistics
      - --collector.zfs                # ZFS pool statistics (no-op if absent)
      - --collector.network_route      # routing table entry counts
      - --collector.meminfo_numa       # NUMA memory node statistics
      - --collector.ksmd               # kernel samepage merging daemon stats
      - --collector.logind             # login session counts via logind (needs dbus)
      - --no-collector.slabinfo        # requires root UID inside container — disable
    restart: unless-stopped

  # ── Metrics database ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "1000:1000"
    # Resolves host.docker.internal → host gateway IP to reach node-exporter
    # which runs in host network mode (no container hostname).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -f /prometheus/prometheus.yml ]; then
          cat > /prometheus/prometheus.yml << 'PROMEOF'
        global:
          scrape_interval: 5s
          evaluation_interval: 5s
        scrape_configs:
          - job_name: hwexp
            static_configs:
              - targets: ['hwexp:9200']
          - job_name: node
            static_configs:
              - targets: ['host.docker.internal:9100']
        PROMEOF
        fi
        exec /bin/prometheus \
          --config.file=/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus/data
    volumes:
      - ./prometheus:/prometheus:z
    ports:
      - "9090:9090"
    restart: unless-stopped
