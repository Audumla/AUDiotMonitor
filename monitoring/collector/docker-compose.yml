# AUDiot Monitor — Collector Stack
#
# Runs on every machine you want to monitor.
# No config files or repo clone needed — just run:
#
#   docker compose up -d
#
# Optional: set HWEXP_HOST to label metrics with this machine's name.
#   HWEXP_HOST=myserver docker compose up -d

services:

  # ── Init: write Prometheus scrape config ──────────────────────────────────
  prometheus-init:
    image: busybox
    command:
      - sh
      - -c
      - |
        cat > /config/prometheus.yml << 'EOF'
        global:
          scrape_interval: 5s
          evaluation_interval: 5s
        scrape_configs:
          - job_name: hwexp
            static_configs:
              - targets: ['hwexp:9200']
          - job_name: node
            static_configs:
              - targets: ['node-exporter:9100']
        EOF
    volumes:
      - ./prometheus/config:/config:z

  # ── Hardware sensor exporter ───────────────────────────────────────────────
  hwexp:
    image: audumla/audiot-hwexp:latest
    container_name: hwexp
    privileged: true                  # required to read /sys/class/hwmon
    volumes:
      - /sys:/sys:ro
      - /proc:/proc:ro
      - ./hwexp/config:/var/lib/hwexp # persists auto-generated mapping rules
    environment:
      HWEXP_HOST: ${HWEXP_HOST:-${HOSTNAME:-localhost}}
    ports:
      - "9200:9200"
    restart: unless-stopped

  # ── OS metrics exporter ───────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    privileged: true
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"
    restart: unless-stopped

  # ── Metrics database ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "1000:1000"
    depends_on:
      prometheus-init:
        condition: service_completed_successfully
    volumes:
      - ./prometheus/config:/etc/prometheus:ro,z
      - ./prometheus/data:/prometheus:z
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    restart: unless-stopped
