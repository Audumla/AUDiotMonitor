global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/audiot/rules/defaults/*.yml
  - /etc/prometheus/audiot/rules/custom/*.yml

scrape_configs:
  - job_name: 'hwexp'
    static_configs:
      - targets: ['hwexp:9200']

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
