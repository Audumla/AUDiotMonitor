server:
  listen_address: "0.0.0.0:9200"
  refresh_interval: 5s
  discovery_interval: 60s

identity:
  host: "localhost"   # overridden at runtime by HWEXP_HOST env var
  platform: "linux"

adapters:
  linux_hwmon:
    enabled: true
  linux_gpu_vendor:
    enabled: true
  linux_vendor_exec:
    enabled: true
    settings:
      scripts_dir: "/etc/hwexp/custom.d"
      source_format: "json"
    timeout: 5s
  linux_storage:
    enabled: true
  linux_system:
    enabled: true
  gateway_manifest:
    enabled: true
    settings:
      manifest_dir: "/etc/hwexp/components"
      local_manifest_dir: "/etc/hwexp/local/components"
mapping:
  rules_file: "/etc/hwexp/mappings.yaml"
  strict_mode: false
  auto_map:
    enabled: true
    generated_file: "/var/lib/hwexp/mappings.auto.yaml"
