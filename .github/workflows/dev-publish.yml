name: Dev Publish

# Publishes audumla/audiot-hwexp:dev on every push to main that touches hwexp
# source. This lets you pull and test new features immediately without waiting
# for the release-please PR cycle.
#
# The :dev tag is always overwritten. It is NOT intended for production use.

on:
  push:
    branches: [main]
    paths:
      - 'hwexp/**'
      - '.github/workflows/dev-publish.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dev-publish:
    name: Build & Push :dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push :dev (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./hwexp
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: audumla/audiot-hwexp:dev
          build-args: |
            VERSION=dev
            BUILDTIME=${{ github.event.head_commit.timestamp }}
          # Registry cache persists across runs and is reusable from local
          # machines via: docker buildx build --cache-from type=registry,...
          cache-from: type=registry,ref=audumla/audiot-hwexp:buildcache
          cache-to: type=registry,ref=audumla/audiot-hwexp:buildcache,mode=max
