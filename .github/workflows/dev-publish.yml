name: Dev Publish

# Publishes audumla/audiot-hwexp:dev on every push to main that touches hwexp
# source. This lets you pull and test new features immediately without waiting
# for the release-please PR cycle.
#
# The :dev tag is always overwritten. It is NOT intended for production use.

on:
  push:
    branches: [main]
    paths:
      - 'hwexp/**'
      - 'monitoring/dashboard/**'
      - '.github/workflows/dev-publish.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hwexp-dev-publish:
    name: Build & Push audiot-hwexp:dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker setup
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push :dev (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./hwexp
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: audumla/audiot-hwexp:dev
          build-args: |
            VERSION=dev
            BUILDTIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=registry,ref=audumla/audiot-hwexp:buildcache
          cache-to: type=registry,ref=audumla/audiot-hwexp:buildcache,mode=max

  dashboard-dev-publish:
    name: Build & Push audiot-dashboard:dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker setup
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push :dev (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./monitoring/dashboard
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: audumla/audiot-dashboard:dev
          cache-from: type=registry,ref=audumla/audiot-dashboard:buildcache
          cache-to: type=registry,ref=audumla/audiot-dashboard:buildcache,mode=max
