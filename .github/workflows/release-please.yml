name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: 'Optional exact release version for release-please (e.g. 1.2.3)'
        required: false
        type: string
      publish_version:
        description: 'Force build + Docker publish for an existing tag (e.g. 0.7.0). Skips release-please.'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the release-please step when doing a forced manual publish
    if: ${{ inputs.publish_version == '' || inputs.publish_version == null }}
    outputs:
      monitoring_release_created: ${{ steps.release.outputs['monitoring--release_created'] }}
      monitoring_tag_name: ${{ steps.release.outputs['monitoring--tag_name'] }}
      hwexp_release_created: ${{ steps.release.outputs['hwexp--release_created'] }}
      hwexp_tag_name: ${{ steps.release.outputs['hwexp--tag_name'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release_as }}

  build-packages:
    name: Build & Upload Release Artifacts
    # Run only for hwexp releases, or when manually publishing an existing hwexp version.
    needs: [release]
    if: |
      always() && (
        needs.release.outputs.hwexp_release_created == 'true' ||
        (inputs.publish_version != '' && inputs.publish_version != null)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.publish_version }}" ]; then
            echo "tag_name=hwexp-v${{ inputs.publish_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${{ needs.release.outputs.hwexp_tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: hwexp/go.sum

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build Binary and Packages
        working-directory: ./hwexp
        run: |
          CLEAN_VERSION="${{ steps.tag.outputs.tag_name }}"
          CLEAN_VERSION="${CLEAN_VERSION#hwexp-v}"
          CLEAN_VERSION="${CLEAN_VERSION:-0.1.0}"
          export PATH=$PATH:$(go env GOPATH)/bin
          make build package VERSION=$CLEAN_VERSION

      - name: Upload Release Artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          echo "Uploading artifacts to release: $TAG_NAME"
          find ./hwexp/dist -maxdepth 1 -type f | xargs gh release upload "$TAG_NAME" --clobber

  docker-publish:
    name: Publish Docker Image
    # Runs in parallel with build-packages — Docker builds from source directly
    # and does not depend on the binary artifacts uploaded by build-packages.
    # This remains scoped to hwexp releases only.
    needs: [release]
    if: |
      always() && needs.release.result != 'failure' && (
        needs.release.outputs.hwexp_release_created == 'true' ||
        (inputs.publish_version != '' && inputs.publish_version != null)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and build time
        id: meta
        run: |
          if [ -n "${{ inputs.publish_version }}" ]; then
            echo "version=${{ inputs.publish_version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ needs.release.outputs.hwexp_tag_name }}"
            echo "version=${TAG#hwexp-v}" >> $GITHUB_OUTPUT
          fi
          echo "buildtime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Docker setup
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./hwexp
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            audumla/audiot-hwexp:${{ steps.meta.outputs.version }}
            audumla/audiot-hwexp:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILDTIME=${{ steps.meta.outputs.buildtime }}
          # Registry cache is warmed by the dev-publish workflow on every
          # main push, so release builds typically hit a fully-warm cache.
          cache-from: type=registry,ref=audumla/audiot-hwexp:buildcache
          cache-to: type=registry,ref=audumla/audiot-hwexp:buildcache,mode=max

  monitoring-docker-publish:
    name: Publish Dashboard Image
    # Depends on kiosk-tools-publish so the Rust build cache is warm before
    # the dashboard image build runs (wl-gammarelay is baked into the image).
    needs: [release, kiosk-tools-publish]
    if: ${{ always() && needs.release.result != 'failure' && needs.release.outputs.monitoring_release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve monitoring version
        id: meta
        run: |
          TAG="${{ needs.release.outputs.monitoring_tag_name }}"
          echo "version=${TAG#monitoring-v}" >> $GITHUB_OUTPUT

      - name: Docker setup
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./monitoring/dashboard
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            audumla/audiot-dashboard:${{ steps.meta.outputs.version }}
            audumla/audiot-dashboard:latest
          cache-from: |
            type=registry,ref=audumla/audiot-kiosk-tools:buildcache
            type=registry,ref=audumla/audiot-dashboard:buildcache
          cache-to: type=registry,ref=audumla/audiot-dashboard:buildcache,mode=max

  kiosk-tools-publish:
    name: Build & Upload wl-gammarelay Binaries
    needs: [release]
    if: ${{ always() && needs.release.result != 'failure' && needs.release.outputs.monitoring_release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/arm64, linux/amd64]
        include:
          - platform: linux/arm64
            suffix: arm64
          - platform: linux/amd64
            suffix: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker setup
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and extract binary (${{ matrix.suffix }})
        uses: docker/build-push-action@v6
        with:
          context: ./monitoring/dashboard
          target: kiosk-tools
          platforms: ${{ matrix.platform }}
          push: false
          outputs: type=local,dest=dist/${{ matrix.suffix }}
          cache-from: type=registry,ref=audumla/audiot-kiosk-tools:buildcache
          cache-to: type=registry,ref=audumla/audiot-kiosk-tools:buildcache,mode=max

      - name: Stage binary
        run: |
          cp dist/${{ matrix.suffix }}/usr/local/bin/wl-gammarelay \
             wl-gammarelay-linux-${{ matrix.suffix }}

      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release.outputs.monitoring_tag_name }}" \
            wl-gammarelay-linux-${{ matrix.suffix }} --clobber

  monitoring-release-artifacts:
    name: Upload Monitoring Release Artifacts
    needs: [release]
    if: ${{ always() && needs.release.result != 'failure' && needs.release.outputs.monitoring_release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage artifacts
        run: |
          TAG="${{ needs.release.outputs.monitoring_tag_name }}"
          VERSION="${TAG#monitoring-v}"
          mkdir -p dist

          # Compose files
          cp monitoring/dashboard/docker-compose.yml          dist/docker-compose.yml
          cp monitoring/dashboard/docker-compose.dietpi.yml   dist/docker-compose.dietpi.yml
          cp monitoring/dashboard/.env.example                dist/env.example

          # Kiosk host scripts
          cp monitoring/dashboard/kiosk.sh                    dist/kiosk.sh
          cp monitoring/dashboard/kiosk-switch.sh             dist/kiosk-switch.sh

          # Bootstrap installer (lib.sh is sourced by both installers)
          cp monitoring/dashboard/setup/install.sh            dist/install.sh
          cp monitoring/dashboard/setup/dietpi-setup.sh       dist/dietpi-setup.sh
          cp monitoring/dashboard/setup/lib.sh                dist/lib.sh

          # Prometheus config for single-host (DietPi) layout
          cp monitoring/dashboard/config/prometheus/prometheus.dietpi.yml dist/prometheus.dietpi.yml

      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release.outputs.monitoring_tag_name }}"
          gh release upload "$TAG" dist/* --clobber

  release-summary:
    name: Release Summary
    needs: [release]
    if: ${{ always() && (inputs.publish_version == '' || inputs.publish_version == null) }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize release-please outputs
        run: |
          {
            echo "## Release Please Results"
            echo
            echo "- monitoring_release_created: ${{ needs.release.outputs.monitoring_release_created }}"
            echo "- monitoring_tag_name: ${{ needs.release.outputs.monitoring_tag_name }}"
            echo "- hwexp_release_created: ${{ needs.release.outputs.hwexp_release_created }}"
            echo "- hwexp_tag_name: ${{ needs.release.outputs.hwexp_tag_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
