name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: 'Optional exact release version for release-please (e.g. 1.2.3)'
        required: false
        type: string
      publish_version:
        description: 'Force build + Docker publish for an existing tag (e.g. 0.7.0). Skips release-please.'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the release-please step when doing a forced manual publish
    if: ${{ inputs.publish_version == '' || inputs.publish_version == null }}
    outputs:
      hwexp_release_created: ${{ steps.release.outputs['hwexp--release_created'] }}
      hwexp_tag_name: ${{ steps.release.outputs['hwexp--tag_name'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release_as }}

  build-packages:
    name: Build & Upload Release Artifacts
    # Run when release-please created a release OR when manually publishing a version
    needs: [release]
    if: |
      always() && (
        needs.release.outputs.hwexp_release_created == 'true' ||
        (inputs.publish_version != '' && inputs.publish_version != null)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.publish_version }}" ]; then
            echo "tag_name=hwexp-v${{ inputs.publish_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${{ needs.release.outputs.hwexp_tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: hwexp/go.sum

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build Binary and Packages
        working-directory: ./hwexp
        run: |
          CLEAN_VERSION="${{ steps.tag.outputs.tag_name }}"
          CLEAN_VERSION="${CLEAN_VERSION#hwexp-v}"
          CLEAN_VERSION="${CLEAN_VERSION:-0.1.0}"
          export PATH=$PATH:$(go env GOPATH)/bin
          make build package VERSION=$CLEAN_VERSION

      - name: Upload Release Artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          echo "Uploading artifacts to release: $TAG_NAME"
          find ./hwexp/dist -maxdepth 1 -type f | xargs gh release upload "$TAG_NAME" --clobber

  docker-publish:
    name: Publish Docker Image
    needs: [release, build-packages]
    if: |
      always() && needs.build-packages.result == 'success' && (
        needs.release.outputs.hwexp_release_created == 'true' ||
        (inputs.publish_version != '' && inputs.publish_version != null)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.publish_version }}" ]; then
            echo "version=${{ inputs.publish_version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ needs.release.outputs.hwexp_tag_name }}"
            echo "version=${TAG#hwexp-v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./hwexp
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            audumla/audiot-hwexp:${{ steps.version.outputs.version }}
            audumla/audiot-hwexp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
