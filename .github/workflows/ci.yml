name: CI

on:
  push:
    branches: ['**']
    paths:
      - 'hwexp/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'hwexp/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: hwexp/go.sum

      - name: Build
        working-directory: ./hwexp
        run: go build ./...

      - name: Vet
        working-directory: ./hwexp
        run: go vet ./...

      - name: Test
        working-directory: ./hwexp
        run: go test -v -race ./...

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    # Only run on PRs and pushes to master — not every feature branch push
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: ./hwexp
          platforms: linux/amd64
          push: false
          tags: audumla/audiot-hwexp:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
