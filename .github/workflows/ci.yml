name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'hwexp/**'
      - 'monitoring/dashboard/setup/**'
      - '.github/workflows/ci.yml'
  schedule:
    # Nightly at 02:00 UTC — catches dependency or environment drift
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: hwexp/go.sum

      - name: Build
        working-directory: ./hwexp
        run: go build ./...

      - name: Vet
        working-directory: ./hwexp
        run: go vet ./...

      - name: Test
        working-directory: ./hwexp
        run: go test -v -race ./...

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: ./hwexp
          platforms: linux/amd64
          push: false
          tags: audumla/audiot-hwexp:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Run on PRs (gate before merge) and on the nightly schedule
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: hwexp/go.sum

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build packages
        working-directory: ./hwexp
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          make build package VERSION=0.0.0-ci

      - name: Make test scripts executable
        run: chmod +x hwexp/tests/integration/*.sh

      - name: Test DEB Install (Ubuntu)
        run: |
          DEB=$(find hwexp/dist -maxdepth 1 -name "*.deb" | head -1)
          docker run --rm \
            -v "$(realpath "$DEB"):/tmp/hwexp.deb:ro" \
            -v "${{ github.workspace }}/hwexp/tests/integration:/tests:ro" \
            ubuntu:22.04 \
            bash -c "apt-get update -qq && apt-get install -y -qq curl && bash /tests/test-deb-install.sh /tmp/hwexp.deb"

      - name: Test RPM Install (Fedora)
        run: |
          RPM=$(find hwexp/dist -maxdepth 1 -name "*.rpm" | head -1)
          docker run --rm \
            -v "$(realpath "$RPM"):/tmp/hwexp.rpm:ro" \
            -v "${{ github.workspace }}/hwexp/tests/integration:/tests:ro" \
            fedora:latest \
            bash -c "bash /tests/test-rpm-install.sh /tmp/hwexp.rpm"

      - name: Test RPM Install (openSUSE Leap)
        run: |
          RPM=$(find hwexp/dist -maxdepth 1 -name "*.rpm" | head -1)
          docker run --rm \
            -v "$(realpath "$RPM"):/tmp/hwexp.rpm:ro" \
            -v "${{ github.workspace }}/hwexp/tests/integration:/tests:ro" \
            opensuse/leap:latest \
            bash -c "bash /tests/test-opensuse-install.sh /tmp/hwexp.rpm"

      - name: Test hwmon Adapter (fake sysfs)
        run: |
          bash hwexp/tests/integration/test-hwmon-install.sh \
            "$(find hwexp/dist -maxdepth 1 -name "*.deb" | head -1)" \
            "$(pwd)"

      - name: Smoke Test - Network
        run: |
          DEB=$(find hwexp/dist -maxdepth 1 -name "*.deb" | head -1)
          bash hwexp/tests/integration/test-network-smoke.sh "$DEB"

  setup-scripts-test:
    name: Setup Scripts Tests (${{ matrix.label }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full Debian Bookworm (amd64) — same base as DietPi on x86
          - label: "debian-bookworm-amd64"
            image: "debian:bookworm"
            platform: "linux/amd64"
          # ARM64 Debian Bookworm — matches DietPi on Raspberry Pi (arm64)
          - label: "debian-bookworm-arm64"
            image: "arm64v8/debian:bookworm"
            platform: "linux/arm64"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Run lib.sh tests in ${{ matrix.label }} container
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}/monitoring/dashboard/setup:/setup:ro" \
            ${{ matrix.image }} \
            bash /setup/test-lib.sh

  monitoring-integration-test:
    name: Monitoring Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest requests pyyaml

      - name: Run Monitoring Integration Tests
        run: |
          python -m pytest monitoring/tests/integration/test_monitoring_stack.py
