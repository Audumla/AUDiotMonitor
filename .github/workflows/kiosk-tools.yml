name: Kiosk Tools

# Builds audumla/audiot-kiosk-tools — a thin image containing pre-built
# kiosk host binaries (wl-gammarelay) for linux/arm64 and linux/amd64.
#
# :dev   — pushed on every main commit that touches the kiosk Dockerfile
# :latest / :version — pushed when a monitoring release is created

on:
  push:
    branches: [main]
    paths:
      - 'monitoring/dashboard/kiosk/Dockerfile'
      - '.github/workflows/kiosk-tools.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dev-publish:
    name: Build & Push :dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push :dev (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./monitoring/dashboard/kiosk
          platforms: linux/amd64,linux/arm64
          push: true
          tags: audumla/audiot-kiosk-tools:dev
          cache-from: type=registry,ref=audumla/audiot-kiosk-tools:buildcache
          cache-to: type=registry,ref=audumla/audiot-kiosk-tools:buildcache,mode=max
